<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Atendente - Fila de Atendimento</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/atendente/atendente.css">
</head>
<body>
  <div class="container-atendente">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <h1>Painel do Atendente</h1>
      </div>
    </header>

    <!-- Login Screen -->
    <div id="login-atendente" class="login-screen">
      <div class="login-box">
        <h2>Acesso do Atendente</h2>
        
        <form id="form-login" onsubmit="fazerLogin(event)">
          <div class="form-group">
            <label>Selecione o Setor</label>
            <select id="setor-atendente" required>
              <option value="">-- Escolha um setor --</option>
              <option value="ouvidoria">Ouvidoria</option>
              <option value="financas">Finanças</option>
              <option value="veiculos">Cadastro de Veículos/Empresas</option>
              <option value="protocolo">Protocolar Documentos</option>
            </select>
          </div>

          <div class="form-group">
            <label>Número da Mesa/Guichê</label>
            <input 
              type="number" 
              id="mesa-atendente" 
              min="1" 
              max="99" 
              placeholder="Ex: 1, 2, 3..."
              required
            >
          </div>

          <div class="fila-info-login">
            <p>Senhas aguardando: <strong id="senhas-aguardando">0</strong></p>
          </div>

          <button type="submit" class="btn btn-primario btn-grande">
            Acessar Painel
          </button>
        </form>
      </div>
    </div>

    <!-- Painel Principal -->
    <main id="painel-atendente" class="main-atendente hidden">
      <div class="painel-content">
        <!-- Informações do atendente -->
        <div class="info-atendente card">
          <div class="info-grid">
            <div class="info-item">
              <label>Setor</label>
              <span id="info-setor">-</span>
            </div>
            <div class="info-item">
              <label>Mesa</label>
              <span id="info-mesa">-</span>
            </div>
            <div class="info-item">
              <label>Tempo de atendimento</label>
              <span id="info-status" class="status-badge">00:00</span>
            </div>
          </div>
          <button class="btn btn-secundario" onclick="sair()">Sair</button>
        </div>

        <!-- Seção de senhas -->
        <div class="grid grid-2">
          <!-- Coluna esquerda - Controles -->
          <div class="coluna-controle">
            <div class="card">
              <h2>Controles</h2>
              
              <!-- Contador de Senhas -->
              <div class="contador-senhas">
                <p>Senhas aguardando:</p>
                <span class="numero-senhas" id="contador-senhas">0</span>
              </div>
              
              <div class="acoes-grupo">
                <h3>Próxima Senha</h3>
                <button class="btn btn-primario btn-grande" onclick="chamarProxima()">
                  Chamar Próxima
                </button>
              </div>

              <div class="acoes-grupo">
                <h3>Repetir Senha</h3>
                <button class="btn btn-sucesso btn-grande" onclick="repetirSenha()" id="btn-repetir" style="opacity: 0.5; cursor: not-allowed;" disabled>
                  🔊 Repetir Senha
                </button>
              </div>

              <div class="acoes-grupo">
                <h3>Finalizar Atendimento</h3>
                <button class="btn btn-alerta btn-grande" onclick="finalizarAtendimento()">
                  ✅ Finalizar Atendimento
                </button>
              </div>

              <div class="acoes-grupo">
                <h3>Chamar Específica</h3>
                <div class="form-group">
                  <input 
                    type="text" 
                    id="input-senha-especifica" 
                    placeholder="Ex: A001, B002..."
                  >
                </div>
                <button class="btn btn-alerta" onclick="chamarEspecifica()">
                  📞 Chamar
                </button>
              </div>
            </div>
          </div>

          <!-- Coluna direita - Display -->
          <div class="coluna-display">
            <!-- Senha atual -->
            <div class="card senha-atual-card">
              <h3>Senha Sendo Atendida</h3>
              <div class="grande-display" id="display-senha-atual">
                <span>--</span>
              </div>
              <div class="info-senha-atual">
                <p>Tipo: <strong id="tipo-atual">-</strong></p>
                <p>Mesa: <strong id="mesa-atual">-</strong></p>
              </div>
            </div>

            <!-- Histórico -->
            <div class="card">
              <h3>Últimas Senhas Chamadas</h3>
              <div class="historico-lista" id="historico-lista">
                <p class="texto-vazio">Nenhuma senha chamada ainda</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/atendente/atendente.js"></script>
</body>
</html>
